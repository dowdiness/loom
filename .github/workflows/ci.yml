name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-modules:
    name: Check + Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: loom
            path: loom
            experimental: false
          - name: seam
            path: seam
            experimental: false
          - name: incr
            path: incr
            experimental: false
          - name: examples/lambda
            path: examples/lambda
            experimental: false
          - name: examples/json
            path: examples/json
            experimental: false
          - name: examples/markdown
            path: examples/markdown
            experimental: false
          - name: egraph
            path: egraph
            experimental: true
          - name: egglog
            path: egglog
            experimental: true
          - name: pretty
            path: pretty
            experimental: true
    env:
      NEW_MOON_MOD: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MoonBit
        uses: hustcer/setup-moonbit@v1.22
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: ${{ matrix.path }}
        run: moon update

      - name: moon check
        working-directory: ${{ matrix.path }}
        run: moon check

      - name: moon test
        working-directory: ${{ matrix.path }}
        run: moon test

  fmt-check:
    name: Format Check ${{ matrix.name }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: loom
            path: loom
            experimental: false
          - name: seam
            path: seam
            experimental: false
          - name: incr
            path: incr
            experimental: false
          - name: examples/lambda
            path: examples/lambda
            experimental: false
          - name: examples/json
            path: examples/json
            experimental: false
          - name: examples/markdown
            path: examples/markdown
            experimental: false
          - name: egraph
            path: egraph
            experimental: true
          - name: egglog
            path: egglog
            experimental: true
          - name: pretty
            path: pretty
            experimental: true
    env:
      NEW_MOON_MOD: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MoonBit
        uses: hustcer/setup-moonbit@v1.22
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: moon fmt --check
        working-directory: ${{ matrix.path }}
        run: moon fmt --check

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - test-modules
      - fmt-check
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ needs.test-modules.result }}" != "success" ]] || \
             [[ "${{ needs.fmt-check.result }}" != "success" ]]; then
            echo "One or more required checks failed"
            exit 1
          fi
          echo "All checks passed"
