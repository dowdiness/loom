name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Covers loom modules and checked-out submodules, including the lambda/egraph
# path that depends on event-graph-walker.

jobs:
  dep-check:
    name: Dependency Boundary Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Run check-deps.sh
        run: bash check-deps.sh

  fmt-check:
    name: Format Check ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: loom
            path: loom
          - name: text-change
            path: text-change
          - name: moji
            path: moji
          - name: seam
            path: seam
          - name: pretty
            path: pretty
          - name: loomgen
            path: loomgen
          - name: examples-lambda
            path: examples/lambda
          - name: examples-json
            path: examples/json
          - name: examples-json-settings
            path: examples/json-settings
          - name: examples-markdown
            path: examples/markdown
          - name: incr
            path: incr
          - name: event-graph-walker
            path: event-graph-walker
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install MoonBit
        uses: hustcer/setup-moonbit@v1.22
        with:
          version: 0.10.0+84519ca0a
          setup-core: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: ${{ matrix.path }}
        run: moon update

      - name: moon fmt --check
        working-directory: ${{ matrix.path }}
        run: moon fmt --check

  fmt-check-submodules:
    name: Format Check ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: egglog
            path: egglog
    env:
      NEW_MOON_MOD: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install MoonBit
        uses: hustcer/setup-moonbit@v1.22
        with:
          version: 0.10.0+84519ca0a
          setup-core: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: ${{ matrix.path }}
        run: moon update

      - name: moon fmt --check
        working-directory: ${{ matrix.path }}
        run: moon fmt --check

  test-modules:
    name: Check + Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: loom
            path: loom
          - name: text-change
            path: text-change
          - name: moji
            path: moji
          - name: seam
            path: seam
          - name: pretty
            path: pretty
          - name: examples-lambda
            path: examples/lambda
          - name: examples-json
            path: examples/json
          - name: examples-json-settings
            path: examples/json-settings
          - name: examples-markdown
            path: examples/markdown
          - name: incr
            path: incr
          - name: loomgen
            path: loomgen
          - name: event-graph-walker
            path: event-graph-walker
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install MoonBit
        uses: hustcer/setup-moonbit@v1.22
        with:
          version: 0.10.0+84519ca0a
          setup-core: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: ${{ matrix.path }}
        run: moon update

      - name: moon check
        working-directory: ${{ matrix.path }}
        run: moon check

      - name: moon test
        working-directory: ${{ matrix.path }}
        run: moon test

  test-modules-submodules:
    name: Check + Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: egglog
            path: egglog
    env:
      NEW_MOON_MOD: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install MoonBit
        uses: hustcer/setup-moonbit@v1.22
        with:
          version: 0.10.0+84519ca0a
          setup-core: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: ${{ matrix.path }}
        run: moon update

      - name: moon check
        working-directory: ${{ matrix.path }}
        run: moon check

      - name: moon test
        working-directory: ${{ matrix.path }}
        run: moon test


  check-loomgen:
    name: Check Loomgen
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install MoonBit
        uses: hustcer/setup-moonbit@v1.22
        with:
          version: 0.10.0+84519ca0a
          setup-core: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: .
        run: moon update

      - name: Build loomgen
        working-directory: .
        run: moon build loomgen --target native

      - name: Check generated files are up to date
        working-directory: .
        run: |
          moon run loomgen --target native -- \
            --seed examples/lambda/syntax/syntax_kind.mbt \
            loomgen/fixtures/term_kind.mbt \
            examples/lambda/token examples/lambda/syntax
          git diff --exit-code -- examples/lambda/syntax/syntax_kind.mbt

      - name: Verify token impls regenerated
        working-directory: .
        run: |
          moon run loomgen --target native -- \
            --seed examples/lambda/syntax/syntax_kind.mbt --skip-syntax \
            examples/lambda/token/token.mbt examples/lambda/token
          git diff --exit-code -- examples/lambda/token/token_impls.g.mbt
  
      - name: Verify spec generation matches fixture
        working-directory: .
        run: |
          moon run loomgen --target native -- \
            --seed examples/lambda/syntax/syntax_kind.mbt --skip-syntax \
            --spec loomgen/fixtures/spec_fixture.g.mbt \
            --language fixture \
            --syntax-type SyntaxKind \
            loomgen/fixtures/term_kind.mbt \
            examples/lambda/token examples/lambda/syntax
          git diff --exit-code -- loomgen/fixtures/spec_fixture.g.mbt

      - name: Verify view fixture generation
        working-directory: .
        run: |
          mkdir -p /tmp/vf-token /tmp/vf-syntax
          moon run loomgen --target native -- \
            loomgen/fixtures/view_fixture.mbt \
            /tmp/vf-token /tmp/vf-syntax
          git diff --exit-code -- /tmp/vf-syntax/views.g.mbt loomgen/fixtures/views_fixture.g.mbt

      - name: Verify multi-trivia spec generation
        working-directory: .
        run: |
          mkdir -p /tmp/mt-token /tmp/mt-syntax
          moon run loomgen --target native -- \
            --spec loomgen/fixtures/multi_trivia_spec.g.mbt \
            --language MultiTrivia \
            --syntax-type MultiTriviaSyntaxKind \
            loomgen/fixtures/multi_trivia_fixture.mbt \
            /tmp/mt-token /tmp/mt-syntax
          git diff --exit-code -- loomgen/fixtures/multi_trivia_spec.g.mbt

      - name: Verify lexmode generation
        working-directory: .
        run: |
          mkdir -p /tmp/lm-token /tmp/lm-syntax
          moon run loomgen --target native -- \
            loomgen/fixtures/lexmode_fixture.mbt \
            /tmp/lm-token /tmp/lm-syntax
          diff /tmp/lm-syntax/lexmode.g.mbt loomgen/fixtures/lexmode_fixture.g.mbt
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - fmt-check
      - fmt-check-submodules
      - test-modules
      - test-modules-submodules
      - check-loomgen
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ needs.fmt-check.result }}" != "success" ]]; then
            echo "fmt-check job failed"
            exit 1
          fi
          if [[ "${{ needs.fmt-check-submodules.result }}" != "success" ]]; then
            echo "fmt-check-submodules job failed"
            exit 1
          fi
          if [[ "${{ needs.test-modules.result }}" != "success" ]]; then
            echo "test-modules job failed"
            exit 1
          fi
          if [[ "${{ needs.test-modules-submodules.result }}" != "success" ]]; then
            echo "test-modules-submodules job failed"
            exit 1
          fi
          if [[ "${{ needs.check-loomgen.result }}" != "success" ]]; then
            echo "check-loomgen job failed"
            exit 1
          fi
          echo "All checks passed"
