name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Covers loom modules and checked-out submodules, including the lambda/egraph
# path that depends on event-graph-walker.

jobs:
  dep-check:
    name: Dependency Boundary Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Run check-deps.sh
        run: bash check-deps.sh

  docs-check:
    name: Docs Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history so the changed-archived-plan decision-record check
          # can diff against origin/main instead of warn-skipping.
          fetch-depth: 0
          # Submodules so links pointing INTO incr/egraph/egglog docs
          # resolve — the link check validates them against the pinned
          # submodule revision, same as a local --recursive clone.
          submodules: recursive
      - name: Run check-docs.sh
        env:
          # For the Active-plans GitHub-state check (section 8).
          GH_TOKEN: ${{ github.token }}
        run: bash check-docs.sh

  mbti-check:
    name: Interface Drift Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # moon info resolves cross-member workspace deps, so submodule
          # members must be present.
          submodules: recursive
      - name: Install MoonBit
        env:
          MOONBIT_INSTALL_VERSION: 0.10.0+84519ca0a
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH
      - name: Verify MoonBit
        run: moon version --all
      - name: moon update
        run: moon update
      # Regenerate every workspace member's .mbti and fail on drift:
      # committed interfaces must match what the pinned toolchain derives
      # from the code. Submodules regenerate too but their inner files are
      # invisible to the parent pathspec diff — each submodule owns its own
      # interface hygiene.
      - name: moon info
        run: moon info
      - name: Interfaces are committed and current
        run: |
          git diff --exit-code -- '*.mbti'
          untracked=$(git ls-files --others --exclude-standard -- '*.mbti')
          if [[ -n "$untracked" ]]; then
            echo "Untracked generated interfaces:"
            echo "$untracked"
            exit 1
          fi

  quickstart-check:
    name: README Quick Start
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install MoonBit
        env:
          MOONBIT_INSTALL_VERSION: 0.10.0+84519ca0a
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH
      - name: Verify MoonBit
        run: moon version --all
      # Runs the commands extracted from the root README's Quick Start fence,
      # so a broken or drifted Quick Start fails CI instead of the next
      # fresh clone. See scripts/check-quickstart.sh for the two documented
      # transformations (clone → ls-remote, skip the post-clone cd).
      - name: Quick Start commands (tests)
        run: bash scripts/check-quickstart.sh --tests
      - name: Quick Start commands (bench)
        run: bash scripts/check-quickstart.sh --bench

  fmt-check:
    name: Format Check ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - name: loom
            path: loom
          - name: text-change
            path: text-change
          - name: moji
            path: moji
          - name: seam
            path: seam
          - name: pretty
            path: pretty
          - name: loomgen
            path: loomgen
          - name: examples-lambda
            path: examples/lambda
          - name: examples-json
            path: examples/json
          - name: examples-json-settings
            path: examples/json-settings
          - name: examples-markdown
            path: examples/markdown
          - name: examples-jsx
            path: examples/jsx
          - name: incr
            path: incr
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install MoonBit
        env:
          MOONBIT_INSTALL_VERSION: 0.10.0+84519ca0a
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: ${{ matrix.path }}
        run: moon update

      - name: moon fmt --check
        working-directory: ${{ matrix.path }}
        run: moon fmt --check

  fmt-check-submodules:
    name: Format Check ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: egglog
            path: egglog
    env:
      NEW_MOON_MOD: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install MoonBit
        env:
          MOONBIT_INSTALL_VERSION: 0.10.0+84519ca0a
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: ${{ matrix.path }}
        run: moon update

      - name: moon fmt --check
        working-directory: ${{ matrix.path }}
        run: moon fmt --check

  test-modules:
    name: Check + Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      NEW_MOON_MOD: '0'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - name: loom
            path: loom
            module: dowdiness/loom
          - name: text-change
            path: text-change
            module: dowdiness/text_change
          - name: moji
            path: moji
            module: dowdiness/moji
          - name: seam
            path: seam
            module: dowdiness/seam
          - name: pretty
            path: pretty
            module: dowdiness/pretty
          - name: examples-lambda
            path: examples/lambda
            module: dowdiness/lambda
          - name: examples-json
            path: examples/json
            module: dowdiness/json
          - name: examples-json-settings
            path: examples/json-settings
            module: dowdiness/json-settings
          - name: examples-markdown
            path: examples/markdown
            module: dowdiness/markdown
          - name: examples-html
            path: examples/html
            module: dowdiness/html
            target: native
          - name: examples-css
            path: examples/css
            module: dowdiness/css-example
            target: native
          - name: examples-graph-dsl
            path: examples/graph-dsl
            module: dowdiness/graph-dsl
            target: native
          - name: examples-moonbit
            path: examples/moonbit
            module: dowdiness/moonbit-example
            target: native
          - name: examples-jsx
            path: examples/jsx
            module: dowdiness/jsx
            target: native
          - name: incr
            path: incr
            module: ''
          - name: loomgen
            path: loomgen
            module: dowdiness/loomgen
            target: native
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install MoonBit
        env:
          MOONBIT_INSTALL_VERSION: 0.10.0+84519ca0a
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: ${{ matrix.path }}
        run: moon update

      - name: moon check
        working-directory: ${{ matrix.path }}
        run: moon check

      - name: moon test
        working-directory: ${{ matrix.path }}
        run: |
          args=()
          if [[ -n "${{ matrix.module }}" ]]; then
            args+=(-p "${{ matrix.module }}")
          fi
          if [[ -n "${{ matrix.target }}" ]]; then
            args+=(--target "${{ matrix.target }}")
          fi
          moon test "${args[@]}"

  test-modules-submodules:
    name: Check + Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: egglog
            path: egglog
    env:
      NEW_MOON_MOD: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install MoonBit
        env:
          MOONBIT_INSTALL_VERSION: 0.10.0+84519ca0a
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: ${{ matrix.path }}
        run: moon update

      - name: moon check
        working-directory: ${{ matrix.path }}
        run: moon check

      - name: moon test
        working-directory: ${{ matrix.path }}
        run: moon test


  check-loomgen:
    name: Check Loomgen
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install MoonBit
        env:
          MOONBIT_INSTALL_VERSION: 0.10.0+84519ca0a
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: .
        run: moon update

      - name: Build loomgen
        working-directory: .
        run: moon build loomgen --target native

      - name: Check generated files are up to date
        working-directory: .
        run: |
          moon run loomgen --target native -- \
            --seed examples/lambda/syntax/syntax_kind.mbt \
            examples/lambda/token/token.mbt \
            --term examples/lambda/term_kind.mbt \
            examples/lambda/token examples/lambda/syntax
          git diff --exit-code -- examples/lambda/syntax/syntax_kind.mbt
      - name: Verify token impls regenerated
        working-directory: .
        run: |
          moon run loomgen --target native -- \
            --seed examples/lambda/syntax/syntax_kind.mbt --skip-syntax \
            examples/lambda/token/token.mbt examples/lambda/token
          git diff --exit-code -- examples/lambda/token/token_impls.g.mbt
      - name: Verify spec generation matches compiled consumer
        working-directory: .
        run: |
          mkdir -p /tmp/spec-token /tmp/spec-syntax
          moon run loomgen --target native -- \
            --seed examples/lambda/syntax/syntax_kind.mbt --skip-syntax \
            --spec examples/lambda/spec.g.mbt \
            --language lambda \
            --syntax-type SyntaxKind \
            examples/lambda/token/token.mbt \
            --term examples/lambda/term_kind.mbt \
            /tmp/spec-token /tmp/spec-syntax
          git diff --exit-code -- examples/lambda/spec.g.mbt
      - name: Verify lambda grammar-ir generation from .loomgrammar
        working-directory: .
        run: |
          mkdir -p /tmp/lambda-ir-token /tmp/lambda-ir-syntax
          moon run loomgen --target native -- \
            --seed examples/lambda/syntax/syntax_kind.mbt --skip-syntax \
            --grammar-ir examples/lambda/grammar_ir.g.mbt \
            --language lambda \
            --grammar-file examples/lambda/lambda.loomgrammar \
            --token-qual @token --syntax-qual @syntax --core-qual @core \
            examples/lambda/token/token.mbt \
            --term examples/lambda/term_kind.mbt \
            /tmp/lambda-ir-token /tmp/lambda-ir-syntax
          moon fmt examples/lambda/grammar_ir.g.mbt
          git diff --exit-code -- examples/lambda/grammar_ir.g.mbt


      - name: Verify json spec generation matches compiled consumer
        working-directory: .
        run: |
          mkdir -p /tmp/json-spec-token /tmp/json-spec-syntax
          moon run loomgen --target native -- \
            --seed examples/json/syntax_kind.mbt --skip-syntax \
            --spec examples/json/spec.g.mbt \
            --language json \
            --syntax-type SyntaxKind \
            --token-qual "" --syntax-qual "" \
            examples/json/token.mbt \
            --term examples/json/meta/term_kind.mbt \
            /tmp/json-spec-token /tmp/json-spec-syntax
          git diff --exit-code -- examples/json/spec.g.mbt

      - name: Verify view fixture generation
        working-directory: .
        run: |
          mkdir -p /tmp/vf-token /tmp/vf-syntax
          moon run loomgen --target native -- \
            loomgen/fixtures/view_fixture.mbt \
            /tmp/vf-token /tmp/vf-syntax
          git diff --exit-code -- /tmp/vf-syntax/views.g.mbt loomgen/fixtures/views_fixture.g.mbt

      - name: Verify multi-trivia spec generation
        working-directory: .
        run: |
          mkdir -p /tmp/mt-token /tmp/mt-syntax
          moon run loomgen --target native -- \
            --spec loomgen/fixtures/multi_trivia_spec.g.mbt \
            --language MultiTrivia \
            --syntax-type MultiTriviaSyntaxKind \
            loomgen/fixtures/multi_trivia_fixture.mbt \
            /tmp/mt-token /tmp/mt-syntax
          git diff --exit-code -- loomgen/fixtures/multi_trivia_spec.g.mbt

      - name: Verify lexmode generation
        working-directory: .
        run: |
          mkdir -p /tmp/lm-token /tmp/lm-syntax
          moon run loomgen --target native -- \
            loomgen/fixtures/lexmode_fixture.mbt \
            /tmp/lm-token /tmp/lm-syntax
          diff /tmp/lm-syntax/lexmode.g.mbt loomgen/fixtures/lexmode_fixture.g.mbt

      - name: Verify lexer skeleton generation
        working-directory: .
        run: |
          mkdir -p /tmp/ls-token /tmp/ls-syntax
          moon run loomgen --target native -- \
            loomgen/fixtures/lexmode_fixture.mbt \
            /tmp/ls-token /tmp/ls-syntax
          diff /tmp/ls-syntax/lexer_skeleton.g.mbt loomgen/fixtures/lexer_skeleton_fixture.g.mbt
      - name: Verify grammar_ir compile-regression fixture
        working-directory: .
        run: |
          bash fixtures/grammar_ir_regression/regenerate.sh
          git diff --exit-code -- fixtures/grammar_ir_regression/grammar_ir.g.mbt
          moon check --target native fixtures/grammar_ir_regression
          moon test --target native fixtures/grammar_ir_regression
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - dep-check
      - docs-check
      - mbti-check
      - quickstart-check
      - fmt-check
      - fmt-check-submodules
      - test-modules
      - test-modules-submodules
      - check-loomgen
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ needs.dep-check.result }}" != "success" ]]; then
            echo "dep-check job failed"
            exit 1
          fi
          if [[ "${{ needs.docs-check.result }}" != "success" ]]; then
            echo "docs-check job failed"
            exit 1
          fi
          if [[ "${{ needs.mbti-check.result }}" != "success" ]]; then
            echo "mbti-check job failed"
            exit 1
          fi
          if [[ "${{ needs.quickstart-check.result }}" != "success" ]]; then
            echo "quickstart-check job failed"
            exit 1
          fi
          if [[ "${{ needs.fmt-check.result }}" != "success" ]]; then
            echo "fmt-check job failed"
            exit 1
          fi
          if [[ "${{ needs.fmt-check-submodules.result }}" != "success" ]]; then
            echo "fmt-check-submodules job failed"
            exit 1
          fi
          if [[ "${{ needs.test-modules.result }}" != "success" ]]; then
            echo "test-modules job failed"
            exit 1
          fi
          if [[ "${{ needs.test-modules-submodules.result }}" != "success" ]]; then
            echo "test-modules-submodules job failed"
            exit 1
          fi
          if [[ "${{ needs.check-loomgen.result }}" != "success" ]]; then
            echo "check-loomgen job failed"
            exit 1
          fi
          echo "All checks passed"
